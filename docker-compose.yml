version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: veripaper-postgres
    environment:
      POSTGRES_USER: veripaper
      POSTGRES_PASSWORD: veripaper_secure_password_change_in_production
      POSTGRES_DB: veripaper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veripaper -d veripaper"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veripaper-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veripaper-backend
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      PROJECT_NAME: VeriPaper API
      APP_VERSION: 1.0.0
      
      # Database configuration
      DB_ENGINE: postgresql
      DB_USER: veripaper
      DB_PASSWORD: veripaper_secure_password_change_in_production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: veripaper
      
      # API configuration
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173"
      MAX_UPLOAD_SIZE_MB: 15
      
      # Paths
      REPORTS_DIR: /app/reports
      AI_MODEL_PATH: /app/models/ai_detector.joblib
    ports:
      - "8000:8000"
    volumes:
      - ./backend/reports:/app/reports
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - veripaper-network
    command: >
      sh -c "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
      working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (optional - for testing)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veripaper-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - veripaper-network

volumes:
  postgres_data:
    driver: local

networks:
  veripaper-network:
    driver: bridge
