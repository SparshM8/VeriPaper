services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: veripaper-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veripaper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veripaper_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-veripaper}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veripaper} -d ${POSTGRES_DB:-veripaper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veripaper-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veripaper-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROJECT_NAME: ${PROJECT_NAME:-VeriPaper API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      
      # Database configuration
      DB_ENGINE: postgresql
      DB_USER: ${POSTGRES_USER:-veripaper}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-veripaper_change_me}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-veripaper}
      
      # API configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-15}
      
      # Paths
      REPORTS_DIR: /app/reports
      AI_MODEL_PATH: /app/models/ai_detector.joblib
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/reports:/app/reports
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - veripaper-network
    working_dir: /app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (optional - for testing)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://veripaper-backend:8000/api}
    container_name: veripaper-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - veripaper-network

volumes:
  postgres_data:
    driver: local

networks:
  veripaper-network:
    driver: bridge
